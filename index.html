<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hermes CLI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css">
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden}
  #t{position:fixed;inset:0}
</style>
<script type="importmap">
{
  "imports": {
    "@xterm/xterm": "https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/+esm",
    "@xterm/addon-fit": "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/+esm",
    "@xterm/addon-webgl": "https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.19.0/+esm",
    "@xterm/addon-web-links": "https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.12.0/+esm",
    "@xterm/addon-unicode11": "https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.9.0/+esm"
  }
}
</script>
</head>
<body>
<div id="t"></div>
<script type="module">
import { Terminal } from "@xterm/xterm";
import { FitAddon } from "@xterm/addon-fit";
import { WebglAddon } from "@xterm/addon-webgl";
import { WebLinksAddon } from "@xterm/addon-web-links";
import { Unicode11Addon } from "@xterm/addon-unicode11";

const term = new Terminal({
  fontSize: 14,
  fontFamily: "monospace",
  cursorBlink: true,
  allowProposedApi: true,
});

const fit = new FitAddon();
term.loadAddon(fit);
term.loadAddon(new WebLinksAddon());

const unicode11 = new Unicode11Addon();
term.loadAddon(unicode11);
term.unicode.activeVersion = "11";

term.open(document.getElementById("t"));

// GPU-accelerated rendering (matches official Hermes dashboard)
try { term.loadAddon(new WebglAddon()); } catch (e) { console.warn("WebGL unavailable:", e); }

fit.fit();

const ws = new WebSocket((location.protocol === "https:" ? "wss" : "ws") + "://" + location.host);
ws.binaryType = "arraybuffer";

ws.onopen = () => {
  ws.send(JSON.stringify({ resize: { cols: term.cols, rows: term.rows } }));
  term.focus();
};

ws.onmessage = (e) => {
  const data = e.data instanceof ArrayBuffer
    ? new TextDecoder().decode(e.data)
    : e.data;
  term.write(data);
};

ws.onclose = () => term.write("\r\n\x1b[31m[disconnected]\x1b[0m");
ws.onerror = () => {};

term.onData((d) => {
  if (ws.readyState === 1) ws.send(d);
});

window.addEventListener("resize", () => {
  fit.fit();
  if (ws.readyState === 1) {
    ws.send(JSON.stringify({ resize: { cols: term.cols, rows: term.rows } }));
  }
});
</script>
</body>
</html>
