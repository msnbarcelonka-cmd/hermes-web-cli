<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hermes CLI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#000}
  #t{position:fixed;inset:0}
</style>
</head>
<body>
<div id="t"></div>
<script>
const term = new Terminal({fontSize:14,fontFamily:"monospace",cursorBlink:true});
const fit = new FitAddon();
term.loadAddon(fit);
term.open(document.getElementById("t"));
fit.fit();

const ws = new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host);
ws.onopen=()=>{
  ws.send(JSON.stringify({resize:{cols:term.cols,rows:term.rows}}));
  term.focus();
};
ws.onmessage=(e)=>term.write(e.data);
ws.onclose=()=>term.write("\r\n\x1b[31m[disconnected]\x1b[0m");

term.onData((d)=>ws.send(d));
addEventListener("resize",()=>{fit.fit();ws.send(JSON.stringify({resize:{cols:term.cols,rows:term.rows}}));});
</script>
</body>
</html>
